<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI कहानी & वीडियो निर्माता</title>
    <meta name="description" content="अपनी कहानी टाइप करें और AI से एनिमेटेड हिंदी वीडियो बनाएं।">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">🎬</div>
            <h1>AI कहानी निर्माता</h1>
            <p class="tagline">अपनी कल्पना को 1 मिनट की एनिमेटेड हिंदी कहानी में बदलें</p>
        </header>

        <!-- Step 1: Story Setup -->
        <section class="card" id="step-setup">
            <div class="step-label"><span>01</span> कहानी का विषय</div>

            <div class="field">
                <label for="story-prompt">आपकी कहानी किसके बारे में है?</label>
                <textarea id="story-prompt" rows="3" placeholder="जैसे: एक शेर और तोते की दोस्ती की कहानी, या एक हाथी जो उड़ना चाहता था..."></textarea>
            </div>

            <!-- Characters -->
            <div class="field">
                <label>पात्र (Characters) — <span style="font-weight:400;font-size:0.85rem;opacity:0.7">वैकल्पिक है, फोटो अपलोड करें या सिर्फ नाम दें</span></label>
                <div id="char-list" class="char-list"></div>
                <div class="char-row">
                    <input type="text" id="char-name" placeholder="नाम (जैसे: शेर राजा)">
                    <input type="text" id="char-desc" placeholder="विवरण (जैसे: दयालु शेर)">
                    <label class="upload-btn" id="char-img-label" for="char-img-input">
                        📷 फोटो
                        <input type="file" id="char-img-input" accept="image/*" hidden>
                    </label>
                    <button class="btn-add" id="btn-add-char">+ जोड़ें</button>
                </div>
            </div>

            <button class="btn-primary" id="btn-generate-story">
                <span class="btn-icon">✨</span> कहानी बनाएं
            </button>
        </section>

        <!-- Step 2: Story Preview -->
        <section class="card hidden" id="step-preview">
            <div class="step-label"><span>02</span> कहानी का पूर्वावलोकन</div>
            <h2 id="story-title" class="story-title"></h2>
            <div id="scenes-list" class="scenes-list"></div>
            <button class="btn-primary" id="btn-make-video">
                <span class="btn-icon">🎬</span> 1 मिनट का वीडियो बनाएं
            </button>
        </section>

        <!-- Step 3: Video -->
        <section class="card hidden" id="step-video">
            <div class="step-label"><span>03</span> आपका वीडियो</div>
            <div id="progress-wrap">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <p id="progress-text">शुरू हो रहा है...</p>
            </div>
            <video id="result-video" controls class="hidden"></video>
            <a id="download-btn" href="#" download class="btn-download hidden">⬇️ वीडियो डाउनलोड करें</a>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
