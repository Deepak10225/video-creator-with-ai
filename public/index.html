<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cinematic Storyteller</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <h1 class="glitch" data-text="CINEMATIC AI">CINEMATIC AI</h1>
            <p class="subtitle">Turn your imagination into animated stories</p>
        </header>

        <section class="setup-section glass">
            <div class="input-group">
                <label for="story-prompt">What's the story about?</label>
                <textarea id="story-prompt" placeholder="A futuristic city where robots dream of nature..."></textarea>
            </div>

            <div class="character-management">
                <h3>Characters</h3>
                <div id="character-list" class="character-list"></div>
                <div class="add-character-row">
                    <input type="text" id="char-name" placeholder="Name">
                    <input type="text" id="char-desc" placeholder="Brief description">
                    <div class="file-input-wrapper">
                        <label for="char-image" class="file-label">Upload Image</label>
                        <input type="file" id="char-image" accept="image/*" class="hidden">
                    </div>
                    <button id="btn-add-char" class="secondary-btn">Add</button>
                </div>
            </div>

            <button id="btn-generate-story" class="primary-btn">Generate Story Concept</button>
        </section>

        <section id="story-preview" class="story-preview hidden">
            <div class="glass">
                <h2 id="preview-title"></h2>
                <div id="scenes-container"></div>
                <button id="btn-create-video" class="primary-btn pulse">Create Animated Video</button>
            </div>
        </section>

        <section id="video-section" class="video-section hidden">
            <div class="glass">
                <h2>Your Masterpiece</h2>
                <div class="video-placeholder" id="video-loader">
                    <div class="spinner"></div>
                    <p>Brewing your cinematic experience...<br><span class="small">(This takes a few minutes)</span></p>
                </div>
                <video id="final-video" controls class="hidden"></video>
                <a id="download-link" href="#" download class="secondary-btn hidden">Download Video</a>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
